name: Bug report
description: Report a problem with SimpleCMP
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the fields below.

  - type: input
    id: version
    attributes:
      label: SimpleCMP version
      description: What version of SimpleCMP are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      description: e.g. Firefox 134 on macOS 15
      placeholder: "Firefox 134 on macOS 15"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Provide a minimal reproduction. A link to a CodeSandbox, StackBlitz, or repository
        is ideal. If that's not possible, describe the steps in detail.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output
      description: Any relevant browser console output or error messages.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem.
